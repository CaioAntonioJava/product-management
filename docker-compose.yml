services:
  # ===================== Banco de dados =====================
  db:
    image: mysql:8.0
    container_name: product_management_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_management
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===================== Backend (Spring Boot) =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product_management_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/product_management?useTimezone=true&serverTimezone=America/Sao_Paulo&useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"

  # ===================== Frontend (Vite + Nginx) =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Injected at build time so the SPA knows where the backend is.
        VITE_API_URL: http://localhost:8080/api
    container_name: product_management_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data: